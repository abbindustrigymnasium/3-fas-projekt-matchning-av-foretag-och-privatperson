<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <h1>Matchning.se</h1>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="profile.html" class="active">Profile</a></li>
        <li><a href="jobs.html">Job Listings</a></li>
        <li><a href="#" onclick="logout()">Log Out</a></li>
      </ul>
    </nav>
  </header>
  <main class="container">
    <section class="profile">
      <h2>Your Profile</h2>
      <form id="profile-form">
        <div class="profile-pic">
            <img id="profilePic" src="default-profile.jpg" alt="Profile Picture">
            <label for="fileInput" class="edit-icon">Click here to choose pic</label>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>
        <label for="name">Full Name:</label>
        <input type="text" id="name" placeholder="Enter your name" required />

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your email" required />

        <label for="intrests">intrests:</label>
        <input type="text" id="intrests" placeholder="Enter your intrests (comma-separated)" />

        <label for="bio">Bio:</label>
        <textarea id="bio" rows="4" placeholder="Tell us about yourself..."></textarea>

        <button type="button" onclick="saveProfile()">Save</button>
      </form>
    </section>
  </main>
  <footer>
    <p>&copy; 2025 Matchning.se. All Rights Reserved.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Saved - View Ads</title>
  <link rel="stylesheet" href="profile.css">
  <script src="script.js"></script>
</head>
<body>
  <header class="header">
    <h1>Profile Saved Successfully</h1>
    <p>Your profile has been updated!</p>
  </header>
  <main class="profile-container">
    <section class="button-container">
      <button onclick="window.location.href='profile.html'">Edit Profile</button>
    </section>

    <section class="ads-container">
      <h2>Job Listings</h2>

      <div class="filters">
        <label for="job-type">Job Type:</label>
        <select id="job-type" onchange="filterAds()">
          <option value="">All</option>
          <option value="full-time">Full-Time</option>
          <option value="part-time">Part-Time</option>
          <option value="freelance">Freelance</option>
        </select>

        <label for="location">Location:</label>
        <input type="text" id="location" placeholder="Enter Location" onchange="filterAds()">
      </div>

      <div class="job-ads">
        <div class="job-ad">
          <h3>Software Engineer</h3>
          <p>Location: New York</p>
          <p>Type: Full-Time</p>
        </div>
        <div class="job-ad">
          <h3>Web Developer</h3>
          <p>Location: London</p>
          <p>Type: Part-Time</p>
        </div>
        <div class="job-ad">
          <h3>Graphic Designer</h3>
          <p>Location: Remote</p>
          <p>Type: Freelance</p>
        </div>
        <!-- More job ads go here -->
      </div>
    </section>
  </main>
</body>
</html>

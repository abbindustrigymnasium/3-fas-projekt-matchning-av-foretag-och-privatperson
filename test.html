function sortDictionariesByKey(nestedDict, sortKey) {
            // Convert the object into an array of [key, value] pairs
            const entries = Object.entries(nestedDict);

            // Sort the entries based on the specified key in descending order
            entries.sort((a, b) => b[1][sortKey] - a[1][sortKey]);

            // Convert the sorted entries back into an object
            const sortedDict = Object.fromEntries(entries);

            return sortedDict;
        }
